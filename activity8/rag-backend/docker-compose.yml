version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: qdrant-db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  web-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - qdrant
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

volumes:
  qdrant_data:
